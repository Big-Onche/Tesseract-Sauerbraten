lazyshader 0 "volumetricclouds" [
    attribute vec4 vvertex;
    void main(void)
    {
        gl_Position = vvertex;
    }
] [
    uniform sampler2D tex0;          // weather map (coverage, type, moisture, erosion)
    @(gfetchdefs tex8 $msaalight ngfetch)
    @(gfetchdefs tex9)
    uniform vec3 camera;
    uniform vec3 sunlightdir;
    uniform vec3 sunlightcolor;
    uniform mat4 worldmatrix;
    uniform vec4 tvcloudscale; // x,y = fullres/rt, z,w = rt/fullres
    uniform vec4 tvcloudbounds; // x=base z, y=top z, z=max dist, w=time
    uniform vec4 tvclouddome;   // x=dome z/r^2 (signed), y,z=dome center xy, w=cloud radius
    uniform vec2 tvcloudscroll; // x,y = accumulated cloud wind offset
    uniform vec4 tvcloudnoise;  // x=base scale, y=detail scale, z=threshold, w=density
    uniform float tvcloudstructure;
    uniform float vclouddensity;
    uniform float vcloudalpha;
    uniform float vcloudthickness;
    uniform vec4 tvcloudsilvermask; // x,y=sun screen position in full-res pixels, z=mask radius in pixels, w=screen fade
    uniform float tvcloudsilvercontrast;
    uniform vec3 vcloudphaseparams; // x=g0, y=g1, z=dual-lobe blend
    uniform vec4 vcloudmultiscatparams; // x=a scatter attenuation, y=b extinction attenuation, z=c angle attenuation, w=octaves
    uniform vec3 fogcolor;
    uniform vec2 fogdensity;
    uniform float tvcloudfogdistmul;
    uniform vec2 tvcloudatmoblend;          // x=min radius blend start, y=max radius blend end
    uniform vec4 vcloudatmosunlight;         // rgb=atmosphere sunlight scale, a=atmosphere alpha
    uniform vec4 vcloudatmoopticaldepthparams;// xyz=shell depth terms, w=planet radius
    uniform vec3 vcloudatmosunweight;
    uniform vec3 vcloudatmomieparams;
    uniform vec3 vcloudatmobetarayleigh;
    uniform vec3 vcloudatmobetamie;
    uniform vec3 vcloudatmobetaozone;
    uniform vec2 hdrgamma;
    uniform float tvcloudsteps;
    uniform float tvcloudsunsteps;
    uniform vec3 vcloudcolour;
    uniform vec4 viewsize;
    fragdata(0) vec4 fragcolor;

    const int TV_MULTISCAT_OCTAVES_MAX = 4;
    const float TV_INV_4PI = 0.07957747154594767;

    float tvhash(vec3 p)
    {
        return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453123);
    }

    float interleavedGradientNoise(vec2 p)
    {
        // Stable per-pixel jitter to avoid time-based shimmer.
        return fract(52.9829189 * fract(0.06711056 * p.x + 0.00583715 * p.y));
    }

    vec2 fullresRepresentativeFromCloudPix(vec2 cloudPix)
    {
        // Center-ish representative of the low-res texel footprint in full-res pixels.
        vec2 p = (cloudPix + vec2(0.5)) * tvcloudscale.xy;
        return clamp(floor(p) + vec2(0.5), vec2(0.5), viewsize.xy - vec2(0.5));
    }

    float tvnoise3(vec3 p)
    {
        vec3 i = floor(p), f = fract(p);
        vec3 u = f*f*(3.0 - 2.0*f);

        float n000 = tvhash(i + vec3(0.0, 0.0, 0.0));
        float n100 = tvhash(i + vec3(1.0, 0.0, 0.0));
        float n010 = tvhash(i + vec3(0.0, 1.0, 0.0));
        float n110 = tvhash(i + vec3(1.0, 1.0, 0.0));
        float n001 = tvhash(i + vec3(0.0, 0.0, 1.0));
        float n101 = tvhash(i + vec3(1.0, 0.0, 1.0));
        float n011 = tvhash(i + vec3(0.0, 1.0, 1.0));
        float n111 = tvhash(i + vec3(1.0, 1.0, 1.0));

        float nx00 = mix(n000, n100, u.x);
        float nx10 = mix(n010, n110, u.x);
        float nx01 = mix(n001, n101, u.x);
        float nx11 = mix(n011, n111, u.x);
        float nxy0 = mix(nx00, nx10, u.y);
        float nxy1 = mix(nx01, nx11, u.y);
        return mix(nxy0, nxy1, u.z);
    }

    float tvfbm(vec3 p)
    {
        float v = 0.0, a = 0.5;
        for(int i = 0; i < 4; ++i)
        {
            v += a * tvnoise3(p);
            p = p * 2.03 + vec3(7.3, 19.1, 3.7);
            a *= 0.5;
        }
        return v;
    }

    float tvcloudoffset(vec2 xy)
    {
        vec2 d = xy - tvclouddome.yz;
        return tvclouddome.x * dot(d, d);
    }

    float tvcloudradiusfade(vec2 xy)
    {
        float radius = tvclouddome.w;
        if(radius <= 1.0e-4) return 0.0;
        vec2 d = xy - tvclouddome.yz;
        float dist2 = dot(d, d);
        float inner = radius * 0.94;
        return 1.0 - smoothstep(inner * inner, radius * radius, dist2);
    }

    float tvcloudflattenedh(vec3 p)
    {
        return p.z - tvcloudoffset(p.xy);
    }

    float tvsunundercloudk(vec3 p, vec3 sdir)
    {
        float belowhorizon = sdir.z <= 0.0 ? 1.0 : 0.0;
        float horizdist = length(p.xy - camera.xy);
        if(horizdist <= 1.0) return belowhorizon;

        float cloudbase = tvcloudbounds.x + tvcloudoffset(p.xy);
        float baseslope = (cloudbase - camera.z) / max(horizdist, 1.0);
        float sunhoriz = max(length(sdir.xy), 1.0e-4);
        float sunslope = sdir.z / sunhoriz;
        float undercloud = smoothstep(-0.03, 0.08, baseslope - sunslope);
        undercloud *= 1.0 - smoothstep(0.18, 0.55, sdir.z);
        return clamp(max(undercloud, belowhorizon), 0.0, 1.0);
    }

    vec4 tvweather(vec2 xy)
    {
        float period = max(tvclouddome.w * 2.0, 1.0);
        vec2 wind = tvcloudscroll * 0.35;
        return texture2D(tex0, (xy + wind) / period);
    }

    float tvsunsilvermask(vec2 screentc)
    {
        if(tvcloudsilvermask.w <= 1.0e-4 || tvcloudsilvermask.z <= 1.0e-4) return 0.0;
        float sundist = length(tvcloudsilvermask.xy - screentc);
        float sunmask = 1.0 - smoothstep(0.0, tvcloudsilvermask.z, sundist);
        sunmask *= sunmask;
        return sunmask * tvcloudsilvermask.w;
    }

    vec3 tvcloudhcoeffs(vec3 o, vec3 d)
    {
        vec2 q = o.xy - tvclouddome.yz;
        vec2 u = d.xy;
        float k = tvclouddome.x;
        float a = -k * dot(u, u);
        float b = d.z - 2.0 * k * dot(q, u);
        float c = o.z - k * dot(q, q);
        return vec3(a, b, c);
    }

    int tvquadraticroots(float a, float b, float c, out vec2 roots)
    {
        roots = vec2(0.0);
        if(abs(a) <= 1.0e-8)
        {
            if(abs(b) <= 1.0e-8) return 0;
            roots.x = -c / b;
            return 1;
        }

        float disc = b*b - 4.0*a*c;
        if(disc < 0.0) return 0;

        float s = sqrt(max(disc, 0.0));
        float q = -0.5 * (b + (b < 0.0 ? -s : s));
        float r0 = q / a;
        float r1 = abs(q) > 1.0e-8 ? c / q : (-b + s) / (2.0 * a);
        if(r0 > r1) { float t = r0; r0 = r1; r1 = t; }
        roots = vec2(r0, r1);
        return disc <= 1.0e-8 ? 1 : 2;
    }

    float tvfirstpositiveroot(float a, float b, float c)
    {
        vec2 roots;
        int nroots = tvquadraticroots(a, b, c, roots);
        float t = 1.0e16;
        if(nroots >= 1 && roots.x > 1.0e-4) t = roots.x;
        if(nroots >= 2 && roots.y > 1.0e-4) t = min(t, roots.y);
        return t;
    }

    float tvcloudheval(vec3 hcoeff, float t)
    {
        return (hcoeff.x * t + hcoeff.y) * t + hcoeff.z;
    }

    float tvdensity(vec3 p, float lodWorldStep)
    {
        float densityk = clamp(vclouddensity, 0.0, 1.0);
        if(densityk <= 1.0e-4) return 0.0;
        vec4 weather = tvweather(p.xy);
        float overcastk = smoothstep(0.5, 1.0, densityk);
        float coverage = mix(weather.r * min(densityk * 2.0, 1.0), 1.0, overcastk);
        coverage = clamp(coverage, 0.0, 1.0);
        if(coverage <= 1.0e-4) return 0.0;
        float cloudtype = mix(weather.g, 0.55, overcastk);
        float moisture = mix(weather.b, 0.85, overcastk * 0.75);
        float erosionfield = weather.a;
        float radiusfade = tvcloudradiusfade(p.xy);
        if(radiusfade <= 1.0e-4) return 0.0;

        float thickness = max(tvcloudbounds.y - tvcloudbounds.x, 1.0);
        float h = clamp((tvcloudflattenedh(p) - tvcloudbounds.x) / thickness, 0.0, 1.0);
        float layer = smoothstep(mix(0.03, 0.12, cloudtype), mix(0.30, 0.48, cloudtype), h)
                    * (1.0 - smoothstep(mix(0.58, 0.70, cloudtype), mix(0.92, 0.99, cloudtype), h));

        vec3 windp = p;
        windp.xy += tvcloudscroll;
        windp.z += tvcloudbounds.w * 2.0;

        float overcast = coverage;
        float macro = tvfbm((windp + vec3(-23.0, 17.0, 9.0)) * (tvcloudnoise.x * 0.22));
        float base = tvfbm(windp * tvcloudnoise.x);
        float detail = tvfbm((windp + vec3(13.0, -9.0, 17.0)) * tvcloudnoise.y);
        float detailRate = max(lodWorldStep, 0.0) * tvcloudnoise.y;
        float farDist = length(p.xy - camera.xy);
        float farfield = max(smoothstep(0.28, 1.20, detailRate), smoothstep(tvcloudbounds.z * 0.08, tvcloudbounds.z * 0.42, farDist));
        float structurebias = clamp(tvcloudstructure - 1.0, -1.0, 1.0);
        float detailFade = clamp(1.0 - detailRate * 1.45, 0.0, 1.0);
        detailFade = detailFade * detailFade * (3.0 - 2.0 * detailFade);
        float detailLod = mix(base, detail, detailFade);
        float macroWeight = clamp((0.58 + 0.22 * farfield) - 0.28 * structurebias, 0.0, 1.0);
        float structure = mix(base, macro, macroWeight);
        float threshold = mix(tvcloudnoise.z + 0.40, tvcloudnoise.z - 0.32, overcast);
        threshold += mix(0.12, -0.06, cloudtype);
        threshold -= (moisture - 0.5) * 0.12;
        threshold -= 0.10 * overcastk;
        float detailWeight = clamp(mix(mix(0.08, 0.22, cloudtype), mix(0.02, 0.07, cloudtype), farfield) + 0.18 * structurebias, 0.0, 0.75);
        float shape = mix(structure, detailLod, detailWeight);
        shape = smoothstep(threshold - mix(0.02, 0.07, moisture), threshold + mix(0.22, 0.10, overcast), shape);
        float edge = 1.0 - smoothstep(mix(0.06, 0.16, farfield), mix(0.78, 0.93, farfield), shape);
        float erosionWeight = clamp(0.40 * (1.0 - overcastk) + 0.18 * structurebias, 0.0, 0.85);
        float erosion = clamp(mix(smoothstep(0.34, 0.86, detailLod), erosionfield, erosionWeight), 0.0, 1.0);
        erosion = mix(erosion, smoothstep(0.42, 0.88, structure), 0.78 * farfield);
        float billow = mix(smoothstep(0.20, 0.85, detailLod), moisture, 0.35);
        billow = mix(billow, smoothstep(0.26, 0.80, structure), 0.55 * farfield);
        float breakup = mix(0.28, 0.06, overcast) * mix(1.0, 0.12, overcastk) * mix(0.78, 0.10, farfield) * clamp(1.0 + 0.45 * structurebias, 0.55, 1.45);
        float d = shape * (1.0 - breakup * edge * erosion);
        d *= mix(0.88, 1.18, billow * shape);
        d = clamp(d, 0.0, 1.0);
        float densityamp = coverage * mix(0.80, 1.45, moisture);
        return d * layer * tvcloudnoise.w * densityamp * radiusfade;
    }

    float tvextworldscale()
    {
        return max(tvcloudnoise.x, 1.0e-5);
    }

    vec2 tvintegratemedium(float sigma)
    {
        sigma = clamp(sigma, 0.0, 32.0);
        float steptrans = exp(-sigma);
        float inscatter = sigma > 1.0e-4 ? (1.0 - steptrans) / sigma : 1.0 - 0.5 * sigma;
        return vec2(steptrans, inscatter);
    }

    vec4 tvintegratescattering(vec3 scatteredlight, float extinction, float stepdist)
    {
        float sigma = clamp(extinction * stepdist, 0.0, 32.0);
        float steptrans = exp(-sigma);
        float clampedextinction = max(extinction, 1.0e-6);
        vec3 integrated = (scatteredlight - scatteredlight * steptrans) / clampedextinction;
        return vec4(integrated, steptrans);
    }

    float tvhgphase(float cosTheta, float g)
    {
        float g2 = g * g;
        float denom = max(1.0 + g2 - 2.0 * g * cosTheta, 1.0e-4);
        return TV_INV_4PI * (1.0 - g2) / pow(denom, 1.5);
    }

    float tvdualhgphase(float cosTheta, vec3 phaseparams)
    {
        float phase0 = tvhgphase(cosTheta, phaseparams.x);
        float phase1 = tvhgphase(cosTheta, phaseparams.y);
        return mix(phase0, phase1, phaseparams.z);
    }

    float tvatmoextinctioncomp(float w)
    {
        return abs(w) > 1.0e-4 ? (exp2(w) - 1.0) / w : 0.69314718;
    }

    vec3 tvatmoscolor(vec3 ray, vec3 sdir)
    {
        if(vcloudatmosunlight.a <= 1.0e-4) return vec3(0.0);

        float costheta = dot(ray, sdir);
        float offset = ray.z * vcloudatmoopticaldepthparams.w;
        vec3 depth = sqrt(vec3(offset * offset) + vcloudatmoopticaldepthparams.xyz) - vec3(offset);
        vec3 rayleighweight = vcloudatmobetarayleigh * depth.x;
        vec3 mieweight = vcloudatmobetamie * depth.y;
        vec3 ozoneweight = vcloudatmobetaozone * (depth.z - depth.x);
        vec3 viewweight = vcloudatmosunweight - (rayleighweight + mieweight + ozoneweight);
        vec3 extinction = vec3(
            tvatmoextinctioncomp(viewweight.x),
            tvatmoextinctioncomp(viewweight.y),
            tvatmoextinctioncomp(viewweight.z)
        );

        float rphase = (1.5 + 0.5 * costheta * costheta) * (3.0 / (16.0 * 3.14159265));
        float miearg = max(vcloudatmomieparams.x + vcloudatmomieparams.y * min(costheta, vcloudatmomieparams.z), 1.0e-4);
        float mphase = inversesqrt(miearg);
        vec3 scatter = rayleighweight * rphase + mieweight * (mphase * mphase * mphase);
        vec3 inscatter = max((vcloudatmosunlight.rgb * scatter) * extinction, vec3(0.0));
        @(hdrgammaencode inscatter)
        return inscatter;
    }

    vec4 tvsuntransmittance(vec3 p, vec3 sdir, float thickness, float sunext, int octaves, float extatten, float densityLodStep)
    {
        vec4 trans = vec4(1.0);
        float tmax;
        if(abs(tvclouddome.x) <= 1.0e-12)
        {
            if(abs(sdir.z) <= 1.0e-4) tmax = thickness * 6.0;
            else
            {
                float boundz = sdir.z >= 0.0 ? tvcloudbounds.y : tvcloudbounds.x;
                tmax = (boundz - p.z) / sdir.z;
            }
        }
        else
        {
            vec3 hcoeff = tvcloudhcoeffs(p, sdir);
            float tbase = tvfirstpositiveroot(hcoeff.x, hcoeff.y, hcoeff.z - tvcloudbounds.x);
            float ttop = tvfirstpositiveroot(hcoeff.x, hcoeff.y, hcoeff.z - tvcloudbounds.y);
            tmax = min(tbase, ttop);
        }
        if(!(tmax > 0.0) || !(tmax < 1.0e15)) return trans;

        tmax = min(tmax, thickness * 6.0);
        const int TV_SUN_STEPS_MAX = 32;
        int sunsteps = int(clamp(tvcloudsunsteps, 2.0, float(TV_SUN_STEPS_MAX)));
        float stepdist = max(tmax / float(sunsteps), 1.0e-3);
        float t = stepdist * 0.35;
        float extatten2 = extatten * extatten;
        float extatten3 = extatten2 * extatten;
        for(int j = 0; j < TV_SUN_STEPS_MAX; ++j)
        {
            if(j >= sunsteps) break;
            float d = tvdensity(p + sdir * t, densityLodStep);
            if(d > 1.0e-4)
            {
                float sigma = d * stepdist * sunext;
                trans.x *= tvintegratemedium(sigma).x;
                if(octaves > 1) trans.y *= tvintegratemedium(sigma * extatten).x;
                if(octaves > 2) trans.z *= tvintegratemedium(sigma * extatten2).x;
                if(octaves > 3) trans.w *= tvintegratemedium(sigma * extatten3).x;
            }
            t += stepdist;
            if(trans.x < 0.05 && (octaves <= 1 || trans.y < 0.05) && (octaves <= 2 || trans.z < 0.05) && (octaves <= 3 || trans.w < 0.05)) break;
        }
        return trans;
    }

    float tvmultiscatlane(vec4 v, int i)
    {
        if(i == 0) return v.x;
        if(i == 1) return v.y;
        if(i == 2) return v.z;
        return v.w;
    }

    float tvmultiscatdirect(vec4 suntrans, float cosTheta, vec3 phaseparams, int octaves, float scatteratten, float phaseatten)
    {
        // Approximate multiple scattering by summing repeated single-scattering octaves
        // with the Frostbite paper's a, b and theta*c^n substitutions.
        float source = 0.0;
        float scatterscale = 1.0;
        float phaseanglescale = 1.0;
        float theta = acos(clamp(cosTheta, -1.0, 1.0));
        for(int i = 0; i < TV_MULTISCAT_OCTAVES_MAX; ++i)
        {
            if(i >= octaves) break;
            float transi = tvmultiscatlane(suntrans, i);
            float phase = tvdualhgphase(cos(theta * phaseanglescale), phaseparams);
            source += scatterscale * transi * phase;
            scatterscale *= scatteratten;
            phaseanglescale *= phaseatten;
        }
        return source;
    }

    void main(void)
    {
        // Map each low-res pixel to a stable representative full-res texel in its footprint.
        vec2 cloudPix = floor(gl_FragCoord.xy);
        vec2 screentc = fullresRepresentativeFromCloudPix(cloudPix);
        float silvermask = tvsunsilvermask(screentc);
        float silvercontrast = max(tvcloudsilvercontrast, 1.0);
        // Explicit sky can write depth without gbuffer normals; treat it as background.
        vec4 normalsample = ngfetch(tex8, screentc);
        bool hasscene = dot(normalsample.rgb, normalsample.rgb) > 1.0e-6;
        @(gdepthunpack depth [gfetch(tex9, screentc)] [
            vec3 wpos = (worldmatrix * vec4(depth*screentc, depth, 1.0)).xyz;
        ] [
            vec4 wpos = worldmatrix * vec4(screentc, depth, 1.0);
            wpos.xyz /= wpos.w;
        ])

        vec3 rayvec = wpos.xyz - camera;
        float raydist = length(rayvec);
        if(!(raydist > 0.0))
        {
            fragcolor = vec4(0.0);
            return;
        }
        float scenedist = hasscene ? min(raydist, tvcloudbounds.z) : tvcloudbounds.z;
        if(scenedist <= 1.0)
        {
            fragcolor = vec4(0.0);
            return;
        }

        vec3 ray = rayvec / max(raydist, 1.0e-4);
        float t0 = 0.0, t1 = scenedist;
        float thickness = max(tvcloudbounds.y - tvcloudbounds.x, 1.0);
        if(abs(tvclouddome.x) <= 1.0e-12)
        {
            if(abs(ray.z) < 1.0e-4)
            {
                if(camera.z < tvcloudbounds.x || camera.z > tvcloudbounds.y)
                {
                    fragcolor = vec4(0.0);
                    return;
                }
            }
            else
            {
                float invrz = 1.0 / ray.z;
                float tz0 = (tvcloudbounds.x - camera.z) * invrz;
                float tz1 = (tvcloudbounds.y - camera.z) * invrz;
                if(tz0 > tz1) { float t = tz0; tz0 = tz1; tz1 = t; }
                t0 = max(t0, tz0);
                t1 = min(t1, tz1);
            }
        }
        else
        {
            vec3 hcoeff = tvcloudhcoeffs(camera, ray);
            float hbase = tvcloudbounds.x, htop = tvcloudbounds.y;
            float hstart = hcoeff.z;
            float hend = tvcloudheval(hcoeff, scenedist);
            bool startinside = hstart >= hbase && hstart <= htop;
            bool endinside = hend >= hbase && hend <= htop;

            vec2 broots = vec2(0.0), troots = vec2(0.0);
            int nbottom = tvquadraticroots(hcoeff.x, hcoeff.y, hcoeff.z - hbase, broots);
            int ntop = tvquadraticroots(hcoeff.x, hcoeff.y, hcoeff.z - htop, troots);

            const float TV_ROOT_INF = 1.0e16;
            const float TV_ROOT_NINF = -1.0e16;
            float rb0 = (nbottom >= 1 && broots.x > 0.0 && broots.x < scenedist) ? broots.x : TV_ROOT_INF;
            float rb1 = (nbottom >= 2 && broots.y > 0.0 && broots.y < scenedist) ? broots.y : TV_ROOT_INF;
            float rt0 = (ntop >= 1 && troots.x > 0.0 && troots.x < scenedist) ? troots.x : TV_ROOT_INF;
            float rt1 = (ntop >= 2 && troots.y > 0.0 && troots.y < scenedist) ? troots.y : TV_ROOT_INF;

            float seg0 = 0.0, seg1 = scenedist;
            bool found = true;

            if(!startinside)
            {
                float rfirst = min(min(rb0, rb1), min(rt0, rt1));
                if(!(rfirst < TV_ROOT_INF * 0.5))
                {
                    found = false;
                }
                else
                {
                    float cb0 = rb0, cb1 = rb1, ct0 = rt0, ct1 = rt1;
                    if(cb0 == rfirst) cb0 = TV_ROOT_INF;
                    else if(cb1 == rfirst) cb1 = TV_ROOT_INF;
                    else if(ct0 == rfirst) ct0 = TV_ROOT_INF;
                    else if(ct1 == rfirst) ct1 = TV_ROOT_INF;

                    float rsecond = min(min(cb0, cb1), min(ct0, ct1));
                    float tprobe = rsecond < TV_ROOT_INF * 0.5 ? 0.5 * (rfirst + rsecond) : 0.5 * (rfirst + scenedist);
                    float hprobe = tvcloudheval(hcoeff, tprobe);
                    if(hprobe >= hbase && hprobe <= htop) seg0 = rfirst;
                    else if(rsecond < TV_ROOT_INF * 0.5) seg0 = rsecond;
                    else found = false;
                }
            }

            if(found && !endinside)
            {
                float lb0 = rb0 < TV_ROOT_INF * 0.5 ? rb0 : TV_ROOT_NINF;
                float lb1 = rb1 < TV_ROOT_INF * 0.5 ? rb1 : TV_ROOT_NINF;
                float lt0 = rt0 < TV_ROOT_INF * 0.5 ? rt0 : TV_ROOT_NINF;
                float lt1 = rt1 < TV_ROOT_INF * 0.5 ? rt1 : TV_ROOT_NINF;
                float rlast = max(max(lb0, lb1), max(lt0, lt1));
                if(!(rlast > TV_ROOT_NINF * 0.5))
                {
                    found = false;
                }
                else
                {
                    if(lb0 == rlast) lb0 = TV_ROOT_NINF;
                    else if(lb1 == rlast) lb1 = TV_ROOT_NINF;
                    else if(lt0 == rlast) lt0 = TV_ROOT_NINF;
                    else if(lt1 == rlast) lt1 = TV_ROOT_NINF;

                    float rprev = max(max(lb0, lb1), max(lt0, lt1));
                    float tprobe = rprev > TV_ROOT_NINF * 0.5 ? 0.5 * (rprev + rlast) : 0.5 * rlast;
                    float hprobe = tvcloudheval(hcoeff, tprobe);
                    if(hprobe >= hbase && hprobe <= htop) seg1 = rlast;
                    else if(rprev > TV_ROOT_NINF * 0.5) seg1 = rprev;
                    else found = false;
                }
            }

            if(!found || seg1 <= seg0)
            {
                fragcolor = vec4(0.0);
                return;
            }
            t0 = max(t0, seg0);
            t1 = min(t1, seg1);
        }

        // Keep a tiny epsilon from the camera to avoid self-sampling artifacts, but
        // do not add a large outside-layer skip (it creates a visible disappear zone
        // when crossing the cloud slab boundary).
        t0 = max(t0, 0.1);
        if(t1 <= t0)
        {
            fragcolor = vec4(0.0);
            return;
        }

        const int TV_STEPS_MAX = 128;
        float extworld = tvextworldscale();
        float viewext = extworld * (12.0 * clamp(vcloudalpha, 0.0, 1.0));
        float sunext = extworld * (10.0 * max(vcloudthickness, 0.0));
        int marchsteps = int(clamp(tvcloudsteps, 4.0, float(TV_STEPS_MAX)));
        float raylen = t1 - t0;
        float stepdist = raylen / float(marchsteps);
        float invmarchsteps = 1.0 / float(marchsteps);
        const float TV_DENSITY_LOD_REF_STEPS = 64.0;
        float referenceStep = raylen / TV_DENSITY_LOD_REF_STEPS;
        vec3 lodProbe = camera + ray * (0.5 * (t0 + t1));
        float pixelFootprint = max(length(dFdx(lodProbe)), length(dFdy(lodProbe)));
        float densityLodStep = max(referenceStep, pixelFootprint * 0.75);
        float rawJitter = interleavedGradientNoise(floor(screentc));
        float jitterAmp = clamp(min(tvcloudscale.z, tvcloudscale.w), 0.0, 1.0);
        float jitter = mix(0.5, rawJitter, jitterAmp);
        float slen = max(length(sunlightdir), 1.0e-4);
        vec3 sdir = sunlightdir / slen;
        vec3 suncol = max(sunlightcolor, vec3(0.0));
        float sunscale = max(max(suncol.r, suncol.g), suncol.b);
        float sunlum = dot(suncol, vec3(0.299, 0.587, 0.114));
        vec3 suntint = sunscale > 1.0e-4 ? suncol / sunscale : vec3(1.0);
        float sunstrength = max(sunlum, 0.85 * sunscale);
        float sunup = clamp(sdir.z * 0.5 + 0.5, 0.0, 1.0);
        float sunheight = clamp(sdir.z, 0.0, 1.0);
        float silversharpness = mix(2.5, 7.0, sunheight);
        float silverintensity = mix(1.18, 1.0, sunheight);
        float silverdensityenter = mix(0.34, 0.24, sunheight);
        float silverdensityexit0 = mix(0.54, 0.40, sunheight);
        float silverdensityexit1 = mix(0.94, 0.84, sunheight);
        float silveralphaenter = mix(0.28, 0.20, sunheight);
        float silveralphaexit0 = mix(0.46, 0.34, sunheight);
        float silveralphaexit1 = mix(0.90, 0.80, sunheight);
        float multiscatext = clamp(vcloudmultiscatparams.y, 0.0, 1.0);
        // Enforce a <= b so the octave approximation stays energy conserving.
        float multiscatscatter = clamp(vcloudmultiscatparams.x, 0.0, multiscatext);
        float multiscatphase = clamp(vcloudmultiscatparams.z, 0.0, 1.0);
        int multiscatoctaves = int(clamp(vcloudmultiscatparams.w, 1.0, float(TV_MULTISCAT_OCTAVES_MAX)));
        vec3 phaseparams = vec3(
            clamp(vcloudphaseparams.x, -0.95, 0.95),
            clamp(vcloudphaseparams.y, -0.95, 0.95),
            clamp(vcloudphaseparams.z, 0.0, 1.0)
        );

        vec3 accum = vec3(0.0);
        float trans = 1.0;
        float alphaaccum = 0.0;
        float distaccum = 0.0;
        float radialaccum = 0.0;
        float silverrimaccum = 0.0;
        for(int i = 0; i < TV_STEPS_MAX; ++i)
        {
            if(i >= marchsteps) break;
            if(trans < 0.03) break;

            float u = (float(i) + jitter) * invmarchsteps;
            float t = mix(t0, t1, u);

            vec3 p = camera + ray * t;
            float d = tvdensity(p, densityLodStep);
            if(d > 1.0e-4)
            {
                float sigmaext = d * viewext;

                float h = clamp((tvcloudflattenedh(p) - tvcloudbounds.x) / thickness, 0.0, 1.0);
                float undercloudk = tvsunundercloudk(p, sdir);
                float sunfacingh = mix(h, 1.0 - h, undercloudk);
                vec4 suntrans = tvsuntransmittance(p, sdir, thickness, sunext, multiscatoctaves, multiscatext, densityLodStep);
                float sunfacefrac = mix(1.0 - h, h, undercloudk);
                float localpath = thickness * sunfacefrac * mix(1.0, 0.60, undercloudk);
                float localangle = max(abs(sdir.z), mix(0.22, 0.34, undercloudk));
                float localsigma = d * sunext * localpath / localangle;
                float localsigma2 = localsigma * multiscatext;
                float localsigma3 = localsigma2 * multiscatext;
                float localsigma4 = localsigma3 * multiscatext;
                vec4 localsuntrans = exp(-clamp(vec4(localsigma, localsigma2, localsigma3, localsigma4), 0.0, 32.0));
                suntrans = mix(suntrans, max(suntrans, localsuntrans), undercloudk);
                float cosT = clamp(dot(ray, sdir), -1.0, 1.0);
                float ambient = mix(0.16, 0.32, sunfacingh) + mix(0.03, 0.12, sunup);
                float direct = mix(0.50, 1.0, sunfacingh) * tvmultiscatdirect(suntrans, cosT, phaseparams, multiscatoctaves, multiscatscatter, multiscatphase) * sunstrength;
                float lightnoise = mix(0.80, 1.05, tvnoise3(p * (tvcloudnoise.x * 0.35) + vec3(2.0, 11.0, 5.0)));

                vec3 basecol = max(vcloudcolour, vec3(0.0));
                vec3 ambienttint = mix(vec3(1.0), suntint, 0.18 + 0.12 * sunup);
                vec3 directtint = mix(vec3(1.0), suntint, 0.75);
                vec3 litcol = mix(basecol * vec3(0.76, 0.80, 0.90), basecol * mix(vec3(1.0), suntint, 0.45), suntrans.x);
                vec3 samplecol = litcol * (ambienttint * ambient + directtint * direct) * lightnoise;
                vec4 scatteringintegral = tvintegratescattering(samplecol * sigmaext, sigmaext, stepdist);
                float steptrans = scatteringintegral.a;
                float stepalpha = 1.0 - steptrans;
                if(stepalpha < 0.002)
                {
                    trans *= steptrans;
                    continue;
                }

                // Energy-conserving analytical integration over a homogeneous step.
                float contribalpha = trans * stepalpha;
                float radial = clamp(length(p.xy - tvclouddome.yz) / max(tvclouddome.w, 1.0e-4), 0.0, 1.0);
                float silverrim = pow(max(cosT, 0.0), silversharpness);
                silverrim *= smoothstep(0.01, silverdensityenter, d) * (1.0 - smoothstep(silverdensityexit0, silverdensityexit1, d));
                silverrim *= 0.7 + 0.3 * tvnoise3(p * (tvcloudnoise.x * 0.55) + vec3(-5.0, 7.0, 3.0));
                silverrim *= silverintensity;
                accum += trans * scatteringintegral.rgb;
                alphaaccum += contribalpha;
                distaccum += contribalpha * t;
                radialaccum += contribalpha * radial;
                silverrimaccum += contribalpha * silverrim;
                trans *= steptrans;
            }
        }

        float alpha = 1.0 - trans;
        if(alpha > 1.0e-4)
        {
            float silveredge = silvermask * smoothstep(0.01, silveralphaenter, alpha) * (1.0 - smoothstep(silveralphaexit0, silveralphaexit1, alpha));
            silveredge *= clamp(alphaaccum > 1.0e-4 ? silverrimaccum / alphaaccum : 0.0, 0.0, 1.0);
            accum *= mix(1.0, silvercontrast, silveredge);
            vec3 silverwarm = mix(vec3(1.0), suntint * 1.15, 0.65);
            accum *= mix(vec3(1.0), silverwarm, 0.35 * silveredge);
            float fogcoord = (alphaaccum > 1.0e-4 ? distaccum / alphaaccum : t1) / max(tvcloudfogdistmul, 1.0e-4);
            float fogvis = clamp(exp2(fogcoord * fogdensity.x) * fogdensity.y, 0.0, 1.0);
            accum = mix(fogcolor * alpha, accum, fogvis);
            if(!hasscene && vcloudatmosunlight.a > 1.0e-4)
            {
                vec3 atmoscolor = tvatmoscolor(ray, sdir);
                float radial = alphaaccum > 1.0e-4 ? radialaccum / alphaaccum : 1.0;
                float blendmin = min(tvcloudatmoblend.x, tvcloudatmoblend.y);
                float blendmax = max(tvcloudatmoblend.x, tvcloudatmoblend.y);
                float radialblend = blendmax > blendmin + 1.0e-4 ? smoothstep(blendmin, blendmax, radial) : step(blendmax, radial);
                float atmosblend = radialblend * clamp(vcloudatmosunlight.a, 0.0, 1.0);
                accum = mix(accum, atmoscolor * alpha, atmosblend);
            }
        }

        fragcolor = vec4(accum, alpha);
    }
]

lazyshader 0 "volumetriccloudsupscale" [
    attribute vec4 vvertex;
    void main(void)
    {
        gl_Position = vvertex;
    }
] [
    // tex0 = low-res cloud RT (RGBA)
    uniform sampler2DRect tex0;
    // tex9 = full-res scene depth (rect or msaa)
    @(gfetchdefs tex9 $msaalight)
    uniform vec4 tvcloudscale;      // xy = output/src, zw = src/output
    uniform float tvbilateraledge;  // relative depth tolerance for cloud upsample taps
    uniform vec4 viewsize;
    fragdata(0) vec4 fragcolor;

    float fetchDepthLinear(vec2 uv)
    {
        @(gdepthunpack depth [gfetch(tex9, uv)])
        return depth;
    }

    vec2 fullresRepresentativeFromCloudPix(vec2 cloudPix)
    {
        vec2 p = (cloudPix + vec2(0.5)) * tvcloudscale.xy;
        return clamp(floor(p) + vec2(0.5), vec2(0.5), viewsize.xy - vec2(0.5));
    }

    float cloudDepthErr(float sampleDepth, float centerDepth)
    {
        float depthTolerance = max(2.0, max(abs(centerDepth), abs(sampleDepth)) * max(tvbilateraledge, 1.0e-5));
        return abs(sampleDepth - centerDepth) / depthTolerance;
    }

    void main(void)
    {
        vec2 uv = gl_FragCoord.xy;
        float centerDepth = fetchDepthLinear(uv);

        vec2 srcsize = max(floor(viewsize.xy * tvcloudscale.zw + vec2(0.5)), vec2(1.0));
        vec2 srcf = uv * tvcloudscale.zw - vec2(0.5);
        srcf = clamp(srcf, vec2(0.0), srcsize - vec2(1.0));
        vec2 base = floor(srcf);
        vec2 fracp = srcf - base;

        vec4 accumCloud = vec4(0.0);
        float totalWeight = 0.0;

        for(int iy = 0; iy < 2; ++iy)
        {
            for(int ix = 0; ix < 2; ++ix)
            {
                vec2 o = vec2(float(ix), float(iy));
                float wx = ix == 0 ? (1.0 - fracp.x) : fracp.x;
                float wy = iy == 0 ? (1.0 - fracp.y) : fracp.y;
                float spatialWeight = wx * wy;
                if(spatialWeight <= 1.0e-6) continue;

                vec2 cloudPix = clamp(base + o, vec2(0.0), srcsize - vec2(1.0));
                vec2 cloudUV = cloudPix + vec2(0.5);
                vec2 depthProbeUV = fullresRepresentativeFromCloudPix(cloudPix);

                float sampleDepth = fetchDepthLinear(depthProbeUV);
                float depthErr = cloudDepthErr(sampleDepth, centerDepth);
                // Strong depth weighting prevents low-res cloud alpha from leaking
                // onto foreground silhouettes during upscale.
                if(depthErr > 3.0) continue;
                float depthWeight = exp(-depthErr * depthErr);
                float w = spatialWeight * depthWeight;
                accumCloud += texture2DRect(tex0, cloudUV) * w;
                totalWeight += w;
            }
        }

        fragcolor = totalWeight > 1.0e-5 ? (accumCloud / totalWeight) : vec4(0.0);
    }
]

lazyshader 0 "volumetriccloudclarity" [
    attribute vec4 vvertex;
    void main(void)
    {
        gl_Position = vvertex;
    }
] [
    // tex0 = full-res cloud RT (RGBA, premultiplied)
    uniform sampler2DRect tex0;
    uniform vec4 vcclarityparams; // x=strength, y=radius, z=alpha edge k, w=luma edge k
    uniform vec4 viewsize;
    fragdata(0) vec4 fragcolor;

    float tvcloudluma(vec3 c)
    {
        return dot(c, vec3(0.299, 0.587, 0.114));
    }

    vec4 tvfetchclarity(vec2 uv)
    {
        return texture2DRect(tex0, clamp(uv, vec2(0.5), viewsize.xy - vec2(0.5)));
    }

    float tvclarityweight(vec4 center, vec4 tapcolor, float centerluma, float spatialweight)
    {
        float sampleluma = tvcloudluma(tapcolor.rgb);
        float alphaDiff = abs(tapcolor.a - center.a);
        float lumaDiff = abs(sampleluma - centerluma);
        float alphaWeight = exp(-alphaDiff * vcclarityparams.z);
        float lumaWeight = exp(-lumaDiff * vcclarityparams.w);
        return spatialweight * alphaWeight * lumaWeight;
    }

    void main(void)
    {
        vec2 uv = gl_FragCoord.xy;
        vec4 center = tvfetchclarity(uv);
        float strength = clamp(vcclarityparams.x, 0.0, 1.0);
        float radius = max(vcclarityparams.y, 0.5);
        float centerluma = tvcloudluma(center.rgb);

        // Five-tap ring blur so the pass boosts local cloud contrast without
        // becoming a directional sharpen or reintroducing denoise artifacts.
        vec2 o0 = vec2( 1.0,        0.0       ) * radius;
        vec2 o1 = vec2( 0.30901688, 0.95105654) * radius;
        vec2 o2 = vec2(-0.80901688, 0.58778524) * radius;
        vec2 o3 = vec2(-0.80901688,-0.58778524) * radius;
        vec2 o4 = vec2( 0.30901688,-0.95105654) * radius;

        vec4 s0 = tvfetchclarity(uv + o0);
        vec4 s1 = tvfetchclarity(uv + o1);
        vec4 s2 = tvfetchclarity(uv + o2);
        vec4 s3 = tvfetchclarity(uv + o3);
        vec4 s4 = tvfetchclarity(uv + o4);

        float w0 = tvclarityweight(center, s0, centerluma, 1.0);
        float w1 = tvclarityweight(center, s1, centerluma, 1.0);
        float w2 = tvclarityweight(center, s2, centerluma, 1.0);
        float w3 = tvclarityweight(center, s3, centerluma, 1.0);
        float w4 = tvclarityweight(center, s4, centerluma, 1.0);

        vec3 blur = center.rgb * 2.0;
        float totalWeight = 2.0;
        blur += s0.rgb * w0;
        blur += s1.rgb * w1;
        blur += s2.rgb * w2;
        blur += s3.rgb * w3;
        blur += s4.rgb * w4;
        totalWeight += w0 + w1 + w2 + w3 + w4;
        blur /= max(totalWeight, 1.0e-5);

        vec3 highpass = center.rgb - blur;
        float detailmask = smoothstep(0.04, 0.22, center.a);
        vec3 result = max(center.rgb + highpass * (strength * detailmask), vec3(0.0));

        // Preserve premultiplied alpha exactly; the clarity pass is RGB-only.
        fragcolor = vec4(result, center.a);
    }
]

lazyshader 0 "volumetriccloudsbilateral" [
    attribute vec4 vvertex;
    void main(void)
    {
        gl_Position = vvertex;
    }
] [
    // tex0 = low-res cloud RT (RGBA)
    uniform sampler2DRect tex0;
    // tex9 = full-res scene depth (rect or msaa)
    @(gfetchdefs tex9 $msaalight)
    uniform vec4 tvcloudscale;      // xy = output/src, zw = src/output (per pass)
    uniform float tvbilateraledge;  // relative depth tolerance for cloud blur taps
    uniform float vcblurscale;           // bilateral tap spacing in full-res pixels
    uniform vec2 tvcloudblurdir;         // (1,0)=horizontal, (0,1)=vertical
    uniform vec4 viewsize;
    fragdata(0) vec4 fragcolor;

    float fetchDepthLinear(vec2 uv)
    {
        @(gdepthunpack depth [gfetch(tex9, uv)])
        return depth;
    }

    vec2 fullresRepresentativeFromCloudPix(vec2 cloudPix)
    {
        vec2 p = (cloudPix + vec2(0.5)) * tvcloudscale.xy;
        return clamp(floor(p) + vec2(0.5), vec2(0.5), viewsize.xy - vec2(0.5));
    }

    vec2 cloudPixFromOutputUV(vec2 uv, vec2 srcsize)
    {
        vec2 srcf = uv * tvcloudscale.zw - vec2(0.5);
        return floor(clamp(srcf, vec2(0.0), srcsize - vec2(1.0)));
    }

    float cloudDepthErr(float sampleDepth, float centerDepth)
    {
        float depthTolerance = max(2.0, max(abs(centerDepth), abs(sampleDepth)) * max(tvbilateraledge, 1.0e-5));
        return abs(sampleDepth - centerDepth) / depthTolerance;
    }

    float gaussian1d9(int i)
    {
        // 9-tap separable gaussian-ish weights (sigma ~2.0).
        if(i == 0 || i == 8) return 0.02763;
        if(i == 1 || i == 7) return 0.06628;
        if(i == 2 || i == 6) return 0.12383;
        if(i == 3 || i == 5) return 0.18017;
        return 0.20418;
    }

    void main(void)
    {
        vec2 uv = gl_FragCoord.xy;
        float centerDepth = fetchDepthLinear(uv);

        vec2 srcsize = max(floor(viewsize.xy * tvcloudscale.zw + vec2(0.5)), vec2(1.0));
        vec2 centerCloudPix = cloudPixFromOutputUV(uv, srcsize);
        vec2 centerCloudUV = centerCloudPix + vec2(0.5);
        vec4 centerCloud = texture2DRect(tex0, centerCloudUV);
        float k = clamp(centerCloud.a * 2.0, 0.0, 1.0);
        float blurstep = max(vcblurscale, 1.0) * mix(2.0, 1.0, k);

        vec4 accumCloud = vec4(0.0);
        float totalWeight = 0.0;

        for(int i = -4; i <= 4; i++)
        {
            vec2 sampleUV = clamp(uv + tvcloudblurdir * (float(i) * blurstep), vec2(0.5), viewsize.xy - vec2(0.5));

            // Snap sampling to the source texel center so depth comparisons line up
            // with the same cloud sample footprint.
            vec2 cloudPix = cloudPixFromOutputUV(sampleUV, srcsize);
            vec2 cloudUV = cloudPix + vec2(0.5);
            vec2 depthProbeUV = fullresRepresentativeFromCloudPix(cloudPix);

            float sampleDepth = fetchDepthLinear(depthProbeUV);
            float depthDiff = cloudDepthErr(sampleDepth, centerDepth);
            if(depthDiff > 3.0) continue;
            float depthWeight = exp(-depthDiff * depthDiff);

            float spatialWeight = gaussian1d9(i + 4);
            float w = spatialWeight * depthWeight;

            accumCloud += texture2DRect(tex0, cloudUV) * w;
            totalWeight += w;
        }

        fragcolor = accumCloud / max(totalWeight, 1.0e-5);
    }
]

lazyshader 0 "volumetriccloudshadowmap" [
    attribute vec4 vvertex;
    void main(void)
    {
        gl_Position = vvertex;
    }
] [
    uniform sampler2D tex0;          // weather map (coverage, type, moisture, erosion)
    uniform vec4 tvcloudbounds;      // x=base z, y=top z, z=max dist, w=time
    uniform vec4 tvclouddome;        // x=dome z/r^2 (signed), y,z=dome center xy, w=cloud radius
    uniform vec2 tvcloudscroll;      // x,y = accumulated cloud wind offset
    uniform vec4 tvcloudnoise;       // x=base scale, y=detail scale, z=threshold, w=density
    uniform float tvcloudstructure;
    uniform float vclouddensity;
    uniform float vcloudthickness;   // reused as shadow opacity/strength
    uniform vec4 tvshadowmapworld;   // x=minx, y=miny, z=world units/texel, w=map size
    uniform float tvcloudshadowsamples;
    fragdata(0) vec4 fragcolor;

    float tvhash(vec3 p)
    {
        return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453123);
    }

    float tvnoise3(vec3 p)
    {
        vec3 i = floor(p), f = fract(p);
        vec3 u = f*f*(3.0 - 2.0*f);

        float n000 = tvhash(i + vec3(0.0, 0.0, 0.0));
        float n100 = tvhash(i + vec3(1.0, 0.0, 0.0));
        float n010 = tvhash(i + vec3(0.0, 1.0, 0.0));
        float n110 = tvhash(i + vec3(1.0, 1.0, 0.0));
        float n001 = tvhash(i + vec3(0.0, 0.0, 1.0));
        float n101 = tvhash(i + vec3(1.0, 0.0, 1.0));
        float n011 = tvhash(i + vec3(0.0, 1.0, 1.0));
        float n111 = tvhash(i + vec3(1.0, 1.0, 1.0));

        float nx00 = mix(n000, n100, u.x);
        float nx10 = mix(n010, n110, u.x);
        float nx01 = mix(n001, n101, u.x);
        float nx11 = mix(n011, n111, u.x);
        float nxy0 = mix(nx00, nx10, u.y);
        float nxy1 = mix(nx01, nx11, u.y);
        return mix(nxy0, nxy1, u.z);
    }

    float tvfbm(vec3 p)
    {
        float v = 0.0, a = 0.5;
        for(int i = 0; i < 4; ++i)
        {
            v += a * tvnoise3(p);
            p = p * 2.03 + vec3(7.3, 19.1, 3.7);
            a *= 0.5;
        }
        return v;
    }

    float tvcloudoffset(vec2 xy)
    {
        vec2 d = xy - tvclouddome.yz;
        return tvclouddome.x * dot(d, d);
    }

    float tvcloudradiusfade(vec2 xy)
    {
        float radius = tvclouddome.w;
        if(radius <= 1.0e-4) return 0.0;
        vec2 d = xy - tvclouddome.yz;
        float dist2 = dot(d, d);
        float inner = radius * 0.94;
        return 1.0 - smoothstep(inner * inner, radius * radius, dist2);
    }

    float tvcloudflattenedh(vec3 p)
    {
        return p.z - tvcloudoffset(p.xy);
    }

    vec4 tvweather(vec2 xy)
    {
        float period = max(tvclouddome.w * 2.0, 1.0);
        vec2 wind = tvcloudscroll * 0.35;
        return texture2D(tex0, (xy + wind) / period);
    }

    float tvdensity(vec3 p)
    {
        float densityk = clamp(vclouddensity, 0.0, 1.0);
        if(densityk <= 1.0e-4) return 0.0;
        vec4 weather = tvweather(p.xy);
        float overcastk = smoothstep(0.5, 1.0, densityk);
        float coverage = mix(weather.r * min(densityk * 2.0, 1.0), 1.0, overcastk);
        coverage = clamp(coverage, 0.0, 1.0);
        if(coverage <= 1.0e-4) return 0.0;
        float cloudtype = mix(weather.g, 0.55, overcastk);
        float moisture = mix(weather.b, 0.85, overcastk * 0.75);
        float erosionfield = weather.a;
        float radiusfade = tvcloudradiusfade(p.xy);
        if(radiusfade <= 1.0e-4) return 0.0;

        float thickness = max(tvcloudbounds.y - tvcloudbounds.x, 1.0);
        float h = clamp((tvcloudflattenedh(p) - tvcloudbounds.x) / thickness, 0.0, 1.0);
        float layer = smoothstep(mix(0.03, 0.12, cloudtype), mix(0.30, 0.48, cloudtype), h)
                    * (1.0 - smoothstep(mix(0.58, 0.70, cloudtype), mix(0.92, 0.99, cloudtype), h));

        vec3 windp = p;
        windp.xy += tvcloudscroll;
        windp.z += tvcloudbounds.w * 2.0;

        float overcast = coverage;
        float macro = tvfbm((windp + vec3(-23.0, 17.0, 9.0)) * (tvcloudnoise.x * 0.22));
        float base = tvfbm(windp * tvcloudnoise.x);
        float detail = tvfbm((windp + vec3(13.0, -9.0, 17.0)) * tvcloudnoise.y);
        float detailRate = max(tvshadowmapworld.z, 0.0) * tvcloudnoise.y * 3.0;
        float farfield = smoothstep(0.28, 1.20, detailRate);
        float structurebias = clamp(tvcloudstructure - 1.0, -1.0, 1.0);
        float detailFade = clamp(1.0 - detailRate * 1.45, 0.0, 1.0);
        detailFade = detailFade * detailFade * (3.0 - 2.0 * detailFade);
        float detailLod = mix(base, detail, detailFade);
        float macroWeight = clamp((0.60 + 0.20 * farfield) - 0.28 * structurebias, 0.0, 1.0);
        float structure = mix(base, macro, macroWeight);
        float threshold = mix(tvcloudnoise.z + 0.40, tvcloudnoise.z - 0.32, overcast);
        threshold += mix(0.12, -0.06, cloudtype);
        threshold -= (moisture - 0.5) * 0.12;
        threshold -= 0.10 * overcastk;
        float detailWeight = clamp(mix(mix(0.08, 0.22, cloudtype), mix(0.02, 0.07, cloudtype), farfield) + 0.18 * structurebias, 0.0, 0.75);
        float shape = mix(structure, detailLod, detailWeight);
        shape = smoothstep(threshold - mix(0.02, 0.07, moisture), threshold + mix(0.22, 0.10, overcast), shape);
        float edge = 1.0 - smoothstep(mix(0.06, 0.16, farfield), mix(0.78, 0.93, farfield), shape);
        float erosionWeight = clamp(0.40 * (1.0 - overcastk) + 0.18 * structurebias, 0.0, 0.85);
        float erosion = clamp(mix(smoothstep(0.34, 0.86, detailLod), erosionfield, erosionWeight), 0.0, 1.0);
        erosion = mix(erosion, smoothstep(0.42, 0.88, structure), 0.78 * farfield);
        float billow = mix(smoothstep(0.20, 0.85, detailLod), moisture, 0.35);
        billow = mix(billow, smoothstep(0.26, 0.80, structure), 0.55 * farfield);
        float breakup = mix(0.28, 0.06, overcast) * mix(1.0, 0.12, overcastk) * mix(0.78, 0.10, farfield) * clamp(1.0 + 0.45 * structurebias, 0.55, 1.45);
        float d = shape * (1.0 - breakup * edge * erosion);
        d *= mix(0.88, 1.18, billow * shape);
        d = clamp(d, 0.0, 1.0);
        float densityamp = coverage * mix(0.80, 1.45, moisture);
        return d * layer * tvcloudnoise.w * densityamp * radiusfade;
    }

    void main(void)
    {
        vec2 worldxy = tvshadowmapworld.xy + gl_FragCoord.xy * tvshadowmapworld.z;
        float thickness = max(tvcloudbounds.y - tvcloudbounds.x, 1.0);

        int nsamples = int(clamp(tvcloudshadowsamples, 1.0, 8.0));
        float densitysum = 0.0;
        for(int i = 0; i < 8; ++i)
        {
            if(i >= nsamples) break;
            float h = nsamples <= 1 ? 0.6 : (float(i) + 0.5) / float(nsamples);
            float z = mix(tvcloudbounds.x, tvcloudbounds.y, h) + tvcloudoffset(worldxy);
            densitysum += tvdensity(vec3(worldxy, z));
        }

        float densityavg = densitysum / float(max(nsamples, 1));
        float shadowk = 8.0 * max(vcloudthickness, 0.0);
        float trans = exp(-densityavg * shadowk);
        fragcolor = vec4(vec3(clamp(trans, 0.0, 1.0)), 1.0);
    }
]

lazyshader 0 "volumetriccloudshadowapply" [
    attribute vec4 vvertex;
    void main(void)
    {
        gl_Position = vvertex;
    }
] [
    uniform sampler2DRect tex0;      // cloud shadow map
    @(gfetchdefs tex8 $msaalight ngfetch)
    @(gfetchdefs tex9)
    uniform mat4 worldmatrix;
    uniform vec3 sunlightdir;
    uniform vec4 tvcloudbounds;      // x=base z, y=top z, z=max dist, w=time
    uniform vec4 tvclouddome;        // x=dome z/r^2 (signed), y,z=dome center xy, w=cloud radius
    uniform vec4 tvshadowmapworld;   // x=minx, y=miny, z=world units/texel, w=map size
    uniform vec4 tvcloudshadowparams;// x=strength, y=cloud mid h, z=horizon fade start, w=horizon fade end
    uniform float tvcloudshadowpcf;
    fragdata(0) vec4 fragcolor;

    float tvcloudoffset(vec2 xy)
    {
        vec2 d = xy - tvclouddome.yz;
        return tvclouddome.x * dot(d, d);
    }

    float tvcloudflattenedh(vec3 p)
    {
        return p.z - tvcloudoffset(p.xy);
    }

    vec3 tvcloudhcoeffs(vec3 o, vec3 d)
    {
        vec2 q = o.xy - tvclouddome.yz;
        vec2 u = d.xy;
        float k = tvclouddome.x;
        float a = -k * dot(u, u);
        float b = d.z - 2.0 * k * dot(q, u);
        float c = o.z - k * dot(q, q);
        return vec3(a, b, c);
    }

    int tvquadraticroots(float a, float b, float c, out vec2 roots)
    {
        roots = vec2(0.0);
        if(abs(a) <= 1.0e-8)
        {
            if(abs(b) <= 1.0e-8) return 0;
            roots.x = -c / b;
            return 1;
        }

        float disc = b*b - 4.0*a*c;
        if(disc < 0.0) return 0;

        float s = sqrt(max(disc, 0.0));
        float q = -0.5 * (b + (b < 0.0 ? -s : s));
        float r0 = q / a;
        float r1 = abs(q) > 1.0e-8 ? c / q : (-b + s) / (2.0 * a);
        if(r0 > r1) { float t = r0; r0 = r1; r1 = t; }
        roots = vec2(r0, r1);
        return disc <= 1.0e-8 ? 1 : 2;
    }

    float tvrootnearestestimate(float a, float b, float c, float testimate)
    {
        vec2 roots;
        int nroots = tvquadraticroots(a, b, c, roots);
        if(nroots <= 0) return 1.0e16;
        float t = roots.x;
        if(nroots >= 2 && abs(roots.y - testimate) < abs(t - testimate)) t = roots.y;
        return t;
    }

    float tvfetchshadow(vec2 worldxy)
    {
        vec2 uv = (worldxy - tvshadowmapworld.xy) / max(tvshadowmapworld.z, 1.0e-4);
        if(uv.x < 0.5 || uv.y < 0.5 || uv.x > tvshadowmapworld.w - 0.5 || uv.y > tvshadowmapworld.w - 0.5)
            return 1.0;

        float pcf = clamp(tvcloudshadowpcf, 0.0, 2.0);
        if(pcf < 0.5) return texture2DRect(tex0, uv).r;

        float accum = 0.0;
        float weights = 0.0;
        accum += texture2DRect(tex0, uv).r * 4.0; weights += 4.0;
        accum += texture2DRect(tex0, uv + vec2( 1.0, 0.0)).r; weights += 1.0;
        accum += texture2DRect(tex0, uv + vec2(-1.0, 0.0)).r; weights += 1.0;
        accum += texture2DRect(tex0, uv + vec2(0.0,  1.0)).r; weights += 1.0;
        accum += texture2DRect(tex0, uv + vec2(0.0, -1.0)).r; weights += 1.0;

        if(pcf > 1.5)
        {
            accum += texture2DRect(tex0, uv + vec2( 1.0,  1.0)).r * 0.75; weights += 0.75;
            accum += texture2DRect(tex0, uv + vec2(-1.0,  1.0)).r * 0.75; weights += 0.75;
            accum += texture2DRect(tex0, uv + vec2( 1.0, -1.0)).r * 0.75; weights += 0.75;
            accum += texture2DRect(tex0, uv + vec2(-1.0, -1.0)).r * 0.75; weights += 0.75;
        }

        return accum / max(weights, 1.0e-4);
    }

    void main(void)
    {
        vec2 screentc = gl_FragCoord.xy;
        vec4 normalsample = ngfetch(tex8, screentc);
        if(dot(normalsample.rgb, normalsample.rgb) <= 1.0e-6)
        {
            fragcolor = vec4(1.0);
            return;
        }
        @(gdepthunpack depth [gfetch(tex9, screentc)] [
            vec3 wpos = (worldmatrix * vec4(depth*screentc, depth, 1.0)).xyz;
        ] [
            vec4 wpos = worldmatrix * vec4(screentc, depth, 1.0);
            wpos.xyz /= wpos.w;
        ])
        if(depth >= 0.999999)
        {
            fragcolor = vec4(1.0);
            return;
        }
        float h0 = tvcloudflattenedh(wpos.xyz);
        if(h0 >= tvcloudbounds.y)
        {
            fragcolor = vec4(1.0);
            return;
        }

        vec3 sdir = sunlightdir / max(length(sunlightdir), 1.0e-4);
        if(sdir.z <= 1.0e-4)
        {
            fragcolor = vec4(1.0);
            return;
        }

        float horizonfade = smoothstep(tvcloudshadowparams.z, tvcloudshadowparams.w, sdir.z);
        if(horizonfade <= 0.0)
        {
            fragcolor = vec4(1.0);
            return;
        }

        float t;
        if(abs(tvclouddome.x) <= 1.0e-12)
        {
            t = (tvcloudshadowparams.y - wpos.z) / sdir.z;
        }
        else
        {
            vec3 hcoeff = tvcloudhcoeffs(wpos.xyz, sdir);
            float testimate = abs(hcoeff.y) > 1.0e-5 ? (tvcloudshadowparams.y - h0) / hcoeff.y : 0.0;
            t = tvrootnearestestimate(hcoeff.x, hcoeff.y, hcoeff.z - tvcloudshadowparams.y, testimate);
            if(abs(t) >= 1.0e15)
            {
                fragcolor = vec4(1.0);
                return;
            }
        }
        float maxt = tvshadowmapworld.w * tvshadowmapworld.z * 2.0;
        t = clamp(t, -maxt, maxt);
        vec2 ps = wpos.xy + sdir.xy * t;
        float shadow = tvfetchshadow(ps);
        float amount = clamp(tvcloudshadowparams.x * horizonfade, 0.0, 1.0);
        float factor = mix(1.0, shadow, amount);
        fragcolor = vec4(vec3(factor), 1.0);
    }
]
